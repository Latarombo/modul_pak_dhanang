<!DOCTYPE html>
<html>
<head>
	<title>Latihan5-8</title>
</head>
<body>
	Link:
	<ol>
	<li><a href="https://www.youtube.com">Youtube</a></li>
	<li><a href="https://www.google.com">Google</a></li>
	<li><a href="https://web.facebook.com">Facebook</a></li>
	</ol>
	
	Link dengan _blank:
	<ol>
	<li><a href="https://www.youtube.com" target="_blank">Youtube</a></li>
	<li><a href="https://www.google.com" target="_blank">Google</a></li>
	<li><a href="https://web.facebook.com" target="_blank">Facebook</a></li>
	</ol>
	
	Link dengan _parent:
	<ol>
	<li><a href="https://www.youtube.com" target="_parent">Youtube</a></li>
	<li><a href="https://www.google.com" target="_parent">Google</a></li>
	<li><a href="https://web.facebook.com" target="_parent">Facebook</a></li>
	</ol>
	
	Link dengan _self:
	<ol>
	<li><a href="https://www.youtube.com" target="_self">Youtube</a></li>
	<li><a href="https://www.google.com" target="_self">Google</a></li>
	<li><a href="https://web.facebook.com" target="_self">Facebook</a></li>
	</ol>
	
	Link dengan _top:
	<ol>
	<li><a href="https://www.youtube.com" target="_top">Youtube</a></li>
	<li><a href="https://www.google.com" target="_top">Google</a></li>
	<li><a href="https://web.facebook.com" target="_top">Facebook</a></li>
	</ol>
</body>
</html>
