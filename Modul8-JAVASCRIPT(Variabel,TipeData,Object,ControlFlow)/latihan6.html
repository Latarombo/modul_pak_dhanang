<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Perulangan II</title>
    <script language="JavaScript">
      // menyembunyikan script dan browser non-JS
      var deret = prompt("Masukkan Jumlah Deret :", "");
      document.writeln("<h2>Latihan Perulangan While</h2>");
      document.writeln("--------------------------------------------");
      document.writeln("<br>");
      var jml = 0.0;
      var angka = 1;
      while (angka <= deret) {
        jml = jml + angka;
        angka++;
      }
      document.writeln("<br>");
      document.writeln(
        "Jumlah Deret Dari 1 Sampai " + deret + " Adalah = " + jml
      );
      document.writeln("<br>");
      document.writeln("-------------------------------------------------");
      // Akhir Dari Penyembunyian
    </script>
  </head>
  <body></body>
</html>
