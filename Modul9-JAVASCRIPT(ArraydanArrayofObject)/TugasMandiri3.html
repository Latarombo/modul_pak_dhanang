<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Siswa RPL</title>
    <style>
      table {
        border-collapse: collapse;
        width: 400px;
      }
      th,
      td {
        border: 1px solid black;
        padding: 6px;
        text-align: center;
      }
      th {
        background-color: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h1>Data Nama Siswa RPL</h1>
    <h3>SMK Negeri 4 Malang</h3>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>NIS</th>
          <th>Nama Siswa</th>
          <th>Kelas</th>
        </tr>
      </thead>
      <tbody id="DataSiswa"></tbody>
    </table>
    <script>
      // Array data siswa RPL (objek)
      let siswa = [
        { nis: "1001", nama: "Andi", kelas: "X RPL A" },
        { nis: "1002", nama: "Budi", kelas: "X RPL B" },
        { nis: "1003", nama: "Citra", kelas: "X RPL C" },
        { nis: "1004", nama: "Dewi", kelas: "XI RPL A" },
      ];

      // Menggunakan DOM
      let Data = document.getElementById("DataSiswa");

      for (let i = 0; i < siswa.length; i++) {
        Data.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${siswa[i].nis}</td>
        <td>${siswa[i].nama}</td>
        <td>${siswa[i].kelas}</td>
      </tr>
    `;
      }
    </script>
  </body>
</html>
